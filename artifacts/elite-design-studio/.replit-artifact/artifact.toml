kind = "web"
previewPath = "/"
title = "Elite Design Studio"
version = "1.0.0"
id = "artifacts/elite-design-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23886

[services.development]
run = "pnpm --filter @workspace/elite-design-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elite-design-studio", "run", "build" ]
publicDir = "artifacts/elite-design-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23886"
BASE_PATH = "/"
