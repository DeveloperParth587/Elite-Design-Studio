openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Elite Design Studio API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Portfolio projects
  - name: leads
    description: Consultation leads
  - name: testimonials
    description: Client testimonials
  - name: ai
    description: AI generation endpoints
  - name: dashboard
    description: Dashboard analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PROJECTS ───────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/featured:
    get:
      operationId: getFeaturedProjects
      tags: [projects]
      summary: Get featured projects for homepage
      responses:
        "200":
          description: Featured projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  # ─── LEADS ──────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads (admin)
      parameters:
        - name: classification
          in: query
          schema:
            type: string
            enum: [HOT, COLD]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a consultation form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Created lead with classification and generated email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/export:
    get:
      operationId: exportLeads
      tags: [leads]
      summary: Export leads as Excel or PDF
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [xlsx, pdf]
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ─── TESTIMONIALS ────────────────────────────────────────────────────────────
  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List all testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create a testimonial (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonialBody"
      responses:
        "201":
          description: Created testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete a testimonial (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── AI ENDPOINTS ───────────────────────────────────────────────────────────
  /ai/enhance-prompt:
    post:
      operationId: enhancePrompt
      tags: [ai]
      summary: Enhance a simple prompt using Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnhancePromptBody"
      responses:
        "200":
          description: Enhanced prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnhancePromptResponse"

  /ai/generate-image:
    post:
      operationId: generateImage
      tags: [ai]
      summary: Generate an interior design image via Hugging Face
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImageBody"
      responses:
        "200":
          description: Generated image as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateImageResponse"

  /ai/generate-email:
    post:
      operationId: generateEmail
      tags: [ai]
      summary: Generate a personalized client email via Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateEmailBody"
      responses:
        "200":
          description: Generated email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateEmailResponse"

  # ─── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/lead-chart:
    get:
      operationId: getLeadChart
      tags: [dashboard]
      summary: Monthly lead volume for chart
      responses:
        "200":
          description: Lead chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        featured:
          type: boolean
        budget:
          type: string
        location:
          type: string
        completedAt:
          type: string
        createdAt:
          type: string
      required: [id, title, description, category, imageUrl, featured, createdAt]

    CreateProjectBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        featured:
          type: boolean
        budget:
          type: string
        location:
          type: string
        completedAt:
          type: string
      required: [title, description, category, imageUrl, featured]

    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        budget:
          type: number
        timeline:
          type: integer
        propertyType:
          type: string
        message:
          type: string
        classification:
          type: string
          enum: [HOT, COLD]
        generatedEmail:
          type: string
        createdAt:
          type: string
      required: [id, name, email, budget, timeline, propertyType, classification, createdAt]

    CreateLeadBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        budget:
          type: number
        timeline:
          type: integer
        propertyType:
          type: string
        message:
          type: string
      required: [name, email, budget, timeline, propertyType]

    Testimonial:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        role:
          type: string
        content:
          type: string
        rating:
          type: integer
        avatarUrl:
          type: string
        createdAt:
          type: string
      required: [id, clientName, role, content, rating, createdAt]

    CreateTestimonialBody:
      type: object
      properties:
        clientName:
          type: string
        role:
          type: string
        content:
          type: string
        rating:
          type: integer
        avatarUrl:
          type: string
      required: [clientName, role, content, rating]

    EnhancePromptBody:
      type: object
      properties:
        prompt:
          type: string
      required: [prompt]

    EnhancePromptResponse:
      type: object
      properties:
        original:
          type: string
        enhanced:
          type: string
      required: [original, enhanced]

    GenerateImageBody:
      type: object
      properties:
        prompt:
          type: string
        enhance:
          type: boolean
      required: [prompt]

    GenerateImageResponse:
      type: object
      properties:
        imageBase64:
          type: string
        enhancedPrompt:
          type: string
      required: [imageBase64]

    GenerateEmailBody:
      type: object
      properties:
        name:
          type: string
        budget:
          type: number
        projectType:
          type: string
      required: [name, budget, projectType]

    GenerateEmailResponse:
      type: object
      properties:
        subject:
          type: string
        body:
          type: string
      required: [subject, body]

    DashboardStats:
      type: object
      properties:
        totalLeads:
          type: integer
        hotLeads:
          type: integer
        coldLeads:
          type: integer
        totalProjects:
          type: integer
        estimatedRevenue:
          type: number
        newLeadsThisMonth:
          type: integer
      required: [totalLeads, hotLeads, coldLeads, totalProjects, estimatedRevenue, newLeadsThisMonth]

    ChartDataPoint:
      type: object
      properties:
        month:
          type: string
        hot:
          type: integer
        cold:
          type: integer
      required: [month, hot, cold]
